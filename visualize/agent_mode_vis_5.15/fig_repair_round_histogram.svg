<svg xmlns="http://www.w3.org/2000/svg" width="980" height="140">

  <defs>
    <style>
      .title { font: 700 18px/1.2 sans-serif; fill:#111; }
      .label { font: 12px/1.2 sans-serif; fill:#222; }
      .tick  { font: 12px/1.2 sans-serif; fill:#333; }
      .grid { stroke:#e6e6e6; stroke-width:1; vector-effect: non-scaling-stroke; }
      .axis { stroke:#111; stroke-width:1.5; vector-effect: non-scaling-stroke; }
      .bar  { fill:#1f77b4; }
      .value{ font: 12px/1.2 sans-serif; fill:#111; }
    </style>
  </defs>
        
<text x="250" y="28" class="title">Repair rounds histogram (count)</text>
<line x1="250" y1="58" x2="250" y2="120" class="grid" />
<text x="250" y="134" class="tick" text-anchor="middle">0</text>
<line x1="422" y1="58" x2="422" y2="120" class="grid" />
<text x="422" y="134" class="tick" text-anchor="middle">1</text>
<line x1="595" y1="58" x2="595" y2="120" class="grid" />
<text x="595" y="134" class="tick" text-anchor="middle">2</text>
<line x1="767" y1="58" x2="767" y2="120" class="grid" />
<text x="767" y="134" class="tick" text-anchor="middle">3</text>
<line x1="940" y1="58" x2="940" y2="120" class="grid" />
<text x="940" y="134" class="tick" text-anchor="middle">4</text>
<line x1="250" y1="120" x2="940" y2="120" class="axis" />
<text x="10" y="81.8" class="label">1</text>
<rect x="250" y="58" width="690" height="34" rx="6" class="bar" />
<text x="948" y="81.8" class="value">4</text>
</svg>