static_check_failed:
  helper_not_in_probe: 替换为目标内核白名单内可用的 helper，或改写为不依赖该 helper 的降级实现。
  helper_min_kernel: 用当前内核已支持的 helper 或等价逻辑替换该 helper，避免继续依赖更高内核版本能力。
  attach_target_not_found: 不要继续自动修改源码；直接报告部署内核上缺少该 attach target，需要更换目标符号、部署环境或人工重设计挂载方式。
  missing_attach_target: 不要继续自动修复；先补齐明确的 attach target，再重新评估是否可部署。
  program_type_min_kernel: 不要继续自动修改源码；这是目标内核版本不满足当前 program type 前提，应更换内核或人工重设挂载方案。
  program_type_not_supported: 不要继续自动修改源码；这是内核能力不支持当前 program type，需要更换内核能力或人工重新设计方案。
  fentry_fexit_require_btf: 不要继续自动修改源码；这是 fentry/fexit 对 BTF 的环境前提不满足，应启用 BTF 或改用人工确认后的其他挂载方式。
  core_requires_btf: 移除 CO-RE/BPF_CORE_READ 依赖，改成非 CO-RE 读取方式，例如 bpf_probe_read_kernel 加稳定偏移或显式降级路径。
  unknown-field-access: 对字段访问增加版本兼容分支；必要时改用条件编译、字段存在性判断或替代字段。
compile_failed:
  core_not_supported: 移除 vmlinux.h 与 CO-RE helper 依赖，改为非 CO-RE 头文件和显式字段读取方案。
load_failed:
  verifier_reject: 根据 verifier 关键报错收敛到最小修复，优先补边界检查、初始化、分支约束或替换不被允许的 helper。
attach_failed:
  attach_type_unsupported: 调整 attach plan 或切换到目标环境支持的挂载方式；必要时对不同 backend 做兼容分支。
runtime_test_failed:
  validator_mismatch: 保持挂载逻辑不变，围绕运行时语义差异做最小修复，优先检查状态更新、过滤条件和输出字段。
