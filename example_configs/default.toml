# Default configuration for eBPF Agent
max_retry = 5
log_level = 2

[agent]
# 是否启用单 agent 修复（main.py 也可用 --no-agent 覆盖）
enable = true
# 单次 deploy 失败后最多生成多少次 patched 源码重试
max_patches = 2

[llm]
# deepseek|openai|anthropic 
#provider = "deepseek"

model = "deepseek-chat"

base_url = "https://api.deepseek.com"

enabled = true

api_key = "sk-af15b1fa3a3647d3b399b742c71686a0"

timeout_s = 60

